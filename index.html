<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decodificador Triple</title>
    <style>
      
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
           
            height: 100dvh; 
            overflow: hidden; 
            background: #000; 
            font-family: sans-serif; 
        }
        
      
        .contenedor-vistas { 
            display: flex; 
            flex-direction: column; 
            width: 100%; 
            height: 100%; 
        }
        
       
        .vista { 
            flex: 1; 
            position: relative; 
            width: 100%; 
            overflow: hidden; 
            background: #111; 
            border-bottom: 3px solid #222; /* Una pequeña línea separadora */
        }
        .vista:last-child { border-bottom: none; }
        
        canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }
        
        .etiqueta { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0,0,0,0.8); 
            padding: 5px 10px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            z-index: 10;
        }

        #pantalla-inicio { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            text-align: center;
            color: white;
        }
        
        #pantalla-inicio h1 { margin-top: 0; color: #fff; }
        #pantalla-inicio p { margin-bottom: 30px; color: #aaa; }
        
        button { 
            padding: 18px 35px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            border-radius: 50px; 
            background: #730612; 
            color: white; 
            box-shadow: 0 4px #52020a; 
            transition: 0.2s; 
        }
        button:active { box-shadow: 0 0; transform: translateY(4px); }
        
        video { display: none; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1>Luces de la Memoria de 3°C - ESET</h1>
        <p>Apunta la cámara para ver diferentes miradas</p>
        <button id="btn-iniciar">INICIAR EXPERIENCIA</button>
    </div>

    <video id="video" playsinline muted autoplay></video>

    <div class="contenedor-vistas">
        <div class="vista">
            <div class="etiqueta" style="color: #ff5252;">Filtro Rojo (Revela Azul)</div>
            <canvas id="canvas-rojo"></canvas>
        </div>
        <div class="vista">
            <div class="etiqueta" style="color: #448aff;">Filtro Azul (Revela Rojo)</div>
            <canvas id="canvas-azul"></canvas>
        </div>
        <div class="vista">
            <div class="etiqueta" style="color: #fff;">Sin Filtro</div>
            <canvas id="canvas-normal"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvases = {
            rojo: document.getElementById('canvas-rojo'),
            azul: document.getElementById('canvas-azul'),
            normal: document.getElementById('canvas-normal')
        };
        const ctxs = {
            rojo: canvases.rojo.getContext('2d', { willReadFrequently: true }),
            azul: canvases.azul.getContext('2d', { willReadFrequently: true }),
            normal: canvases.normal.getContext('2d', { willReadFrequently: true })
        };

        document.getElementById('btn-iniciar').onclick = function() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    document.getElementById('pantalla-inicio').style.display = 'none';
                    procesar();
                })
                .catch(err => alert("Error: Asegúrate de dar permisos de cámara."));
        };

        function procesar() {
            if (video.paused || video.ended) return;

            Object.values(canvases).forEach(c => {
                if (c.width !== video.videoWidth) {
                    c.width = video.videoWidth;
                    c.height = video.videoHeight;
                }
            });

            if (canvases.normal.width > 0) {
                ctxs.normal.drawImage(video, 0, 0);

                const frame = ctxs.normal.getImageData(0, 0, canvases.normal.width, canvases.normal.height);
                
                const dataRojo = new Uint8ClampedArray(frame.data);
                for (let i = 0; i < dataRojo.length; i += 4) {
                    dataRojo[i + 1] = 0; 
                    dataRojo[i + 2] = 0; 
                }
                ctxs.rojo.putImageData(new ImageData(dataRojo, frame.width, frame.height), 0, 0);

                const dataAzul = new Uint8ClampedArray(frame.data);
                for (let i = 0; i < dataAzul.length; i += 4) {
                    dataAzul[i] = 0;     
                    dataAzul[i + 1] = 0; 
                }
                ctxs.azul.putImageData(new ImageData(dataAzul, frame.width, frame.height), 0, 0);
            }

            requestAnimationFrame(procesar);
        }
    </script>
</body>
</html>
