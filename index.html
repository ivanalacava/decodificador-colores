<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decodificador Triple</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .contenedor-vistas { display: flex; flex-direction: column; gap: 5px; padding: 5px; }
        .vista { position: relative; width: 100%; background: #000; border-radius: 4px; overflow: hidden; line-height: 0; }
        canvas { width: 100%; height: auto; display: block; }
        .etiqueta { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; line-height: 1.2; }
        
        #pantalla-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 20px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; background: #4CAF50; color: white; box-shadow: 0 4px #2e7d32; transition: 0.2s; }
        button:active { box-shadow: 0 0; transform: translateY(4px); }
        
        video { display: none; } /* La cámara corre oculta */
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1>Decodificador</h1>
        <p>Apunta a tus mensajes ocultos</p>
        <button id="btn-iniciar">INICIAR EXPERIENCIA</button>
    </div>

    <video id="video" playsinline muted autoplay></video>

    <div class="contenedor-vistas">
        <div class="vista">
            <div class="etiqueta" style="color: #ff5252;">Filtro Rojo (Revela Azul)</div>
            <canvas id="canvas-rojo"></canvas>
        </div>
        <div class="vista">
            <div class="etiqueta" style="color: #448aff;">Filtro Azul (Revela Rojo)</div>
            <canvas id="canvas-azul"></canvas>
        </div>
        <div class="vista">
            <div class="etiqueta">Sin Filtro</div>
            <canvas id="canvas-normal"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvases = {
            rojo: document.getElementById('canvas-rojo'),
            azul: document.getElementById('canvas-azul'),
            normal: document.getElementById('canvas-normal')
        };
        const ctxs = {
            rojo: canvases.rojo.getContext('2d', { willReadFrequently: true }),
            azul: canvases.azul.getContext('2d', { willReadFrequently: true }),
            normal: canvases.normal.getContext('2d', { willReadFrequently: true })
        };

        document.getElementById('btn-iniciar').onclick = function() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    document.getElementById('pantalla-inicio').style.display = 'none';
                    procesar();
                })
                .catch(err => alert("Error: Asegúrate de dar permisos de cámara."));
        };

        function procesar() {
            if (video.paused || video.ended) return;

            // Ajustar tamaño de los canvas al video
            Object.values(canvases).forEach(c => {
                if (c.width !== video.videoWidth) {
                    c.width = video.videoWidth;
                    c.height = video.videoHeight;
                }
            });

            if (canvases.normal.width > 0) {
                // 1. Dibujar vista Normal
                ctxs.normal.drawImage(video, 0, 0);

                // 2. Obtener datos para los filtros
                const frame = ctxs.normal.getImageData(0, 0, canvases.normal.width, canvases.normal.height);
                
                // --- PROCESAR ROJO ---
                const dataRojo = new Uint8ClampedArray(frame.data);
                for (let i = 0; i < dataRojo.length; i += 4) {
                    dataRojo[i + 1] = 0; // G
                    dataRojo[i + 2] = 0; // B
                }
                ctxs.rojo.putImageData(new ImageData(dataRojo, frame.width, frame.height), 0, 0);

                // --- PROCESAR AZUL ---
                const dataAzul = new Uint8ClampedArray(frame.data);
                for (let i = 0; i < dataAzul.length; i += 4) {
                    dataAzul[i] = 0;     // R
                    dataAzul[i + 1] = 0; // G
                }
                ctxs.azul.putImageData(new ImageData(dataAzul, frame.width, frame.height), 0, 0);
            }

            requestAnimationFrame(procesar);
        }
    </script>
</body>
</html>
